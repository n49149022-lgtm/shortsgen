<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShortsGen — Финал</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root { --bg:#050508; --card:rgba(255,255,255,0.03); --border:rgba(255,255,255,0.06); --fg:#e8e8f0; --muted:#555570; --accent:#ff2d2d; --accent2:#ff8800; --accent-glow:rgba(255,45,45,0.3); --green:#00e68a; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--fg); min-height:100vh; }
  h1,h2,h3,h4 { font-family:'Space Grotesk',sans-serif; }
  .bg-m { position:fixed; inset:0; z-index:0; pointer-events:none; background: radial-gradient(ellipse at 15% 10%, rgba(255,45,45,0.1) 0%, transparent 50%), radial-gradient(ellipse at 85% 90%, rgba(255,136,0,0.08) 0%, transparent 50%); }
  .sg-input { width:100%; padding:11px 14px; border-radius:9px; background:rgba(255,255,255,0.05); border:1px solid var(--border); color:var(--fg); font-size:14px; outline:none; transition:border .2s; font-family:inherit; }
  .sg-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
  .sg-input::placeholder { color:var(--muted); }
  .style-btn { padding:7px 0; border-radius:8px; font-size:11px; font-weight:700; background:rgba(255,255,255,0.04); border:1px solid var(--border); color:var(--muted); cursor:pointer; transition:all .2s; text-align:center; text-transform:uppercase; letter-spacing:.5px; }
  .style-btn:hover { background:rgba(255,255,255,0.07); color:var(--fg); }
  .style-btn.active { background:linear-gradient(135deg,var(--accent),var(--accent2)); border-color:transparent; color:#fff; box-shadow:0 3px 12px var(--accent-glow); }
  .sg-range { -webkit-appearance:none; width:100%; height:5px; border-radius:3px; background:rgba(255,255,255,0.08); outline:none; }
  .sg-range::-webkit-slider-thumb { -webkit-appearance:none; width:18px; height:18px; border-radius:50%; background:linear-gradient(135deg,var(--accent),var(--accent2)); cursor:pointer; }
  .gen-btn { width:100%; padding:14px; border:none; border-radius:11px; font-size:15px; font-weight:800; font-family:'Space Grotesk',sans-serif; cursor:pointer; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; transition:transform .15s, box-shadow .15s; box-shadow:0 5px 25px var(--accent-glow); text-transform:uppercase; letter-spacing:1px; }
  .gen-btn:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 8px 35px var(--accent-glow); }
  .gen-btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
  .p-bar { height:3px; border-radius:2px; background:rgba(255,255,255,0.06); overflow:hidden; }
  .p-fill { height:100%; border-radius:2px; transition:width .3s; background:linear-gradient(90deg,var(--accent),var(--accent2)); }
  .p-fill.done { background:linear-gradient(90deg,var(--green),#00c9ff); }
  .audio-drop { border:2px dashed var(--border); border-radius:12px; padding:16px; text-align:center; cursor:pointer; transition:all .2s; position:relative; }
  .audio-drop:hover { border-color:var(--accent); background:rgba(255,45,45,0.03); }
  .audio-drop input { position:absolute; inset:0; opacity:0; cursor:pointer; }
  .audio-info { margin-top:8px; font-size:12px; color:var(--green); display:none; align-items:center; gap:8px; background:rgba(0,230,138,0.05); padding:8px 12px; border-radius:8px; }
  .audio-info.active { display:flex; }
  .phone-frame { width:260px; height:462px; border-radius:28px; border:3px solid rgba(255,255,255,0.1); background:#000; overflow:hidden; position:relative; box-shadow:0 20px 60px rgba(0,0,0,0.7); }
  .phone-frame canvas { width:100%; height:100%; display:block; }
  .phone-notch { position:absolute; top:0; left:50%; transform:translateX(-50%); width:90px; height:22px; background:#000; border-radius:0 0 14px 14px; z-index:5; }
  .tl-item { width:60px; height:107px; border-radius:8px; overflow:hidden; border:2px solid transparent; cursor:pointer; flex-shrink:0; transition:all .2s; background:rgba(255,255,255,0.02); position:relative; }
  .tl-item:hover { transform:scale(1.05); }
  .tl-item.active { border-color:var(--accent); box-shadow:0 0 12px var(--accent-glow); }
  .tl-item img { width:100%; height:100%; object-fit:cover; display:block; }
  .tl-item span { position:absolute; bottom:2px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.8); color:#fff; font-size:10px; font-weight:700; padding:1px 5px; border-radius:4px; z-index:2; }
  .act-btn { padding:9px 18px; border-radius:9px; font-size:13px; font-weight:600; border:1px solid var(--border); background:var(--card); color:var(--fg); cursor:pointer; transition:all .2s; display:inline-flex; align-items:center; gap:7px; font-family:inherit; }
  .act-btn:hover { background:rgba(255,255,255,0.06); }
  .act-btn.primary { background:linear-gradient(135deg,var(--green),#00c9ff); border-color:transparent; color:#000; font-weight:700; }
  .act-btn.primary:hover { box-shadow:0 4px 20px rgba(0,230,138,0.2); }
  .act-btn:disabled { opacity:0.3; cursor:not-allowed; }
  .toast { padding:12px 16px; border-radius:10px; font-size:12px; font-weight:500; backdrop-filter:blur(20px); border:1px solid var(--border); animation:tin .3s ease; max-width:340px; display:flex; align-items:center; gap:8px; pointer-events:auto; }
  .toast-success { background:rgba(0,40,25,0.95); color:var(--green); border-color:rgba(0,230,138,0.2); }
  .toast-error { background:rgba(40,10,10,0.95); color:#ff6b6b; border-color:rgba(255,59,59,0.2); }
  .toast-warn { background:rgba(40,35,10,0.95); color:#ffc940; border-color:rgba(255,201,64,0.2); }
  .toast-info { background:rgba(20,20,40,0.95); color:var(--fg); }
  @keyframes tin { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  .spinner { width:16px; height:16px; border:2px solid rgba(255,255,255,0.2); border-top-color:#fff; border-radius:50%; animation:spin .6s linear infinite; display:inline-block; }
  @keyframes spin { to { transform:rotate(360deg); } }
  @media (max-width:860px) { .main-wrap { flex-direction:column !important; } .panel-l { width:100% !important; border-right:none !important; border-bottom:1px solid var(--border); } .phone-frame { width:220px; height:391px; } }
</style>
</head>
<body>

<div class="bg-m" aria-hidden="true"></div>
<div id="toasts" style="position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column-reverse;gap:8px;pointer-events:none;"></div>

<header style="position:relative;z-index:10;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(5,5,8,0.8);backdrop-filter:blur(15px);">
  <div style="display:flex;align-items:center;gap:10px;">
    <div style="width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;"><i class="fa-solid fa-bolt" style="font-size:13px;color:#fff;"></i></div>
    <h1 style="font-size:18px;font-weight:800;letter-spacing:-0.5px;">SHORTS<span style="color:var(--accent);">GEN</span> <span style="font-size:10px;color:var(--muted);font-weight:400;">TEXT-PARSE</span></h1>
  </div>
</header>

<main class="main-wrap" style="position:relative;z-index:10;display:flex;min-height:calc(100vh - 55px);">
  
  <aside class="panel-l" style="width:320px;flex-shrink:0;padding:16px;border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;gap:14px;">
    
    <div>
      <label style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:5px;">Тема шортса</label>
      <input id="inp-topic" class="sg-input" type="text" placeholder="Загадки глубокого океана..." maxlength="200">
    </div>

    <div>
      <label style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:5px;">Стиль</label>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;" id="styles">
        <button class="style-btn active" data-s="motivation">Мотивация</button>
        <button class="style-btn" data-s="facts">Факты</button>
        <button class="style-btn" data-s="humor">Юмор</button>
        <button class="style-btn" data-s="horror">Хоррор</button>
        <button class="style-btn" data-s="science">Наука</button>
        <button class="style-btn" data-s="story">Стори</button>
      </div>
    </div>

    <div>
      <label style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:flex;justify-content:space-between;margin-bottom:5px;"><span>Клипов</span><span id="v-slides" style="color:var(--fg);">5</span></label>
      <input id="r-slides" class="sg-range" type="range" min="3" max="8" value="5">
    </div>

    <div>
      <label style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:5px;"><i class="fa-solid fa-microphone" style="margin-right:4px;color:var(--green);"></i>Озвучка (MP3)</label>
      <div id="audio-drop" class="audio-drop">
        <input type="file" id="audio-file" accept="audio/*">
        <i class="fa-solid fa-cloud-arrow-up" style="font-size:20px;color:var(--muted);margin-bottom:4px;display:block;"></i>
        <span style="font-size:12px;color:var(--muted);">Загрузи MP3 (любой TTS)</span>
        <div id="audio-info" class="audio-info">
          <i class="fa-solid fa-circle-check"></i>
          <span id="audio-name"></span>
          <span id="audio-dur" style="margin-left:auto;color:var(--accent2);font-weight:700;"></span>
          <button onclick="event.stopPropagation(); clearAudio();" style="background:none;border:none;color:#ff4444;cursor:pointer;font-size:14px;"><i class="fa-solid fa-xmark"></i></button>
        </div>
      </div>
    </div>

    <button id="btn-gen" class="gen-btn" onclick="generate()">
      <i class="fa-solid fa-wand-magic-sparkles" style="margin-right:8px;"></i>Собрать шортс
    </button>

    <div id="prog-wrap" style="display:none;flex-direction:column;gap:10px;">
      <div id="p-sc"><div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:2px;"><span style="color:var(--muted);">Сценарий</span><span class="ps" style="color:var(--muted);">...</span></div><div class="p-bar"><div class="p-fill" style="width:0%"></div></div></div>
      <div id="p-im"><div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:2px;"><span style="color:var(--muted);">AI Кадры</span><span class="ps" style="color:var(--muted);">...</span></div><div class="p-bar"><div class="p-fill" style="width:0%"></div></div></div>
      <div id="p-vd"><div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:2px;"><span style="color:var(--muted);">Рендер</span><span class="ps" style="color:var(--muted);">...</span></div><div class="p-bar"><div class="p-fill" style="width:0%"></div></div></div>
    </div>
  </aside>

  <section style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:14px;">
    <div id="empty" style="text-align:center;max-width:360px;">
      <div style="width:60px;height:60px;border-radius:16px;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;"><i class="fa-solid fa-clapperboard" style="font-size:24px;color:var(--muted);"></i></div>
      <h2 style="font-size:16px;font-weight:700;margin-bottom:4px;">Текстовый парсинг</h2>
      <p style="font-size:12px;color:var(--muted);line-height:1.5;">Теперь нейросеть не сможет схалтурить и выдать 1 слайд. Жёсткий текстовый шаблон.</p>
    </div>

    <div id="preview" style="display:none;flex-direction:column;align-items:center;gap:12px;">
      <div class="phone-frame"><div class="phone-notch"></div><canvas id="cvs" width="540" height="960"></canvas></div>
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="act-btn" onclick="nav(-1)" id="b-prev" style="padding:6px 10px;" disabled><i class="fa-solid fa-chevron-left"></i></button>
        <span id="s-count" style="font-size:12px;font-weight:600;min-width:50px;text-align:center;">1 / 5</span>
        <button class="act-btn" onclick="nav(1)" id="b-next" style="padding:6px 10px;" disabled><i class="fa-solid fa-chevron-right"></i></button>
      </div>
      <button class="act-btn primary" onclick="download()" id="b-dl" disabled><i class="fa-solid fa-download"></i> Скачать .webm</button>
    </div>

    <div id="tl-wrap" style="display:none;width:100%;max-width:600px;">
      <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;">Таймлайн</div>
      <div id="tl" style="display:flex;gap:5px;overflow-x:auto;padding-bottom:4px;"></div>
    </div>
  </section>
</main>

<script>
const S = { topic:'', style:'motivation', num:5, sc:null, imgs:[], urls:[], audioUrl:null, audioDur:0, videoBlob:null, cur:0, busy:false };
const RW = 720, RH = 1280;

function toast(m, t='info', d=4000) {
  const c = document.getElementById('toasts'), el = document.createElement('div');
  el.className = `toast toast-${t}`; 
  el.innerHTML = `<i class="fa-solid fa-${{info:'circle-info',success:'circle-check',error:'circle-xmark',warn:'triangle-exclamation'}[t]||'circle-info'}"></i><span>${m}</span>`;
  c.appendChild(el); setTimeout(()=>{ el.style.opacity='0'; setTimeout(()=>el.remove(),300); }, d);
}

function prog(id, p, txt) {
  const el = document.getElementById(id); if(!el) return;
  const f = el.querySelector('.p-fill'), s = el.querySelector('.ps');
  f.style.width = p+'%'; f.classList.toggle('done', p>=100);
  s.style.color = p>=100 ? 'var(--green)' : p>0 ? 'var(--accent2)' : 'var(--muted)';
  if(txt) s.textContent = txt;
}

// Настройки
document.getElementById('styles').onclick = e => { const b = e.target.closest('.style-btn'); if(!b) return; document.querySelectorAll('.style-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); S.style = b.dataset.s; };
document.getElementById('r-slides').oninput = e => { S.num = +e.target.value; document.getElementById('v-slides').textContent = S.num; };
document.getElementById('inp-topic').onkeydown = e => { if(e.key==='Enter') generate(); };

// Аудио
document.getElementById('audio-file').onchange = e => { if(e.target.files.length) handleAudio(e.target.files[0]); };
document.getElementById('audio-drop').ondragover = e => e.preventDefault();
document.getElementById('audio-drop').ondrop = e => { e.preventDefault(); if(e.dataTransfer.files.length) handleAudio(e.dataTransfer.files[0]); };
function handleAudio(file) {
  if(!file.type.startsWith('audio/')) return toast('Нужен аудиофайл', 'error');
  if(S.audioUrl) URL.revokeObjectURL(S.audioUrl);
  S.audioUrl = URL.createObjectURL(file);
  const a = new Audio(S.audioUrl);
  a.onloadedmetadata = () => {
    S.audioDur = a.duration;
    document.getElementById('audio-name').textContent = file.name.length > 20 ? file.name.substring(0,20)+'...' : file.name;
    document.getElementById('audio-dur').textContent = `${Math.floor(S.audioDur/60)}:${String(Math.floor(S.audioDur%60)).padStart(2,'0')}`;
    document.getElementById('audio-info').classList.add('active');
  };
}
function clearAudio() { S.audioUrl=null; S.audioDur=0; document.getElementById('audio-info').classList.remove('active'); document.getElementById('audio-file').value=''; }

// --- СЦЕНАРИЙ (АНТИ-ХАЛТУРЩИК: ЖЁСТКИЙ ТЕКСТОВЫЙ ШАБЛОН) ---
async function getScenario(topic, style, num) {
  const sp = { motivation:'мощные фразы', facts:'удивительные детали', humor:'ирония', horror:'саспенс', science:'просто о сложном', story:'эмоции' };
  
  // Формируем шаблон, где нейросеть ВЫНУЖДЕНА писать ровно num слайдов
  let userPrompt = `Тема: "${topic}". Стиль: ${sp[style]}. Напиши сценарий. Строго ${num} слайдов. Формат (без markdown, просто текст):\n\n`;
  for(let i=1; i<=num; i++) {
    userPrompt += `СЛАЙД ${i}\nТЕКСТ: (максимум 70 символов)\nКАДР: (детальное описание на английском для AI картинки)\n\n`;
  }

  const res = await fetch('https://text.pollinations.ai/', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ 
      messages:[
        {role:'system', content:'Ты сценарист. Заполни предоставленный шаблон. Пиши только по шаблону, без лишних слов.'},
        {role:'user', content: userPrompt}
      ], 
      model:'openai', seed: Math.floor(Math.random()*1e5) 
    })
  });
  
  if(!res.ok) throw new Error('LLM ошибка '+res.status);
  let raw = await res.text(); 
  
  // Убираем markdown блоки если нейросеть всё же их добавила
  raw = raw.replace(/```[\s\S]*?```/g, m => m.replace(/```\w*\n?/g, ''));
  
  const slides = [];
  // Ищем блоки по регулярке
  const regex = /СЛАЙД\s*\d+[\s\S]*?ТЕКСТ:\s*([^\n]+)[\s\S]*?КАДР:\s*([^\n]+)/gi;
  let match;
  while ((match = regex.exec(raw)) !== null) {
    slides.push({ text: match[1].trim(), img: match[2].trim() });
  }
  
  // АБСОЛЮТНЫЙ ФЭЛЛБЭК: Если нейросеть вообще не поняла шаблон
  if(slides.length === 0) {
    const sentences = raw.split(/[.!?]\s*/).filter(s => s.trim().length > 10);
    for(let i=0; i<num; i++) {
      const txt = sentences[i % sentences.length] ? sentences[i % sentences.length].trim().substring(0, 70) : `Интересный факт номер ${i+1}`;
      slides.push({ text: txt, img: `cinematic photo about ${topic}, high quality, vertical` });
    }
  }
  
  // Доплняем недостающие слайды если нейросеть ленилась
  while(slides.length < num) {
    const last = slides[slides.length - 1];
    slides.push({ text: "И это ещё не всё...", img: last.img });
  }
  
  return { slides: slides.slice(0, num) };
}

// --- КАРТИНКИ ПАРАЛЛЕЛЬНО ---
async function getImg(p) {
  const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(p)}?width=${RW}&height=${RH}&nologo=true&seed=${Math.floor(Math.random()*999999)}&model=flux`;
  return new Promise((res, rej) => { 
    const img = new Image(); 
    img.crossOrigin = 'anonymous'; 
    img.onload = () => res(img); 
    img.onerror = () => rej(new Error('fail')); 
    img.src = url; 
    setTimeout(() => rej(new Error('timeout')), 45000); 
  });
}

// ЗАГЛУШКА (Возвращает И Image И DataURL строку, чтобы не было багов в таймлайне)
function makeFallback(i, text) {
  const c = document.createElement('canvas'); c.width = RW; c.height = RH;
  const x = c.getContext('2d');
  const colors = ['#1a0a2e','#0a2e1a','#2e1a0a','#0a1a2e','#2e0a1a','#1a2e0a','#0a2e2e','#2e2e0a'];
  const g = x.createLinearGradient(0,0,0,RH);
  g.addColorStop(0, colors[i % colors.length]); g.addColorStop(1, '#000');
  x.fillStyle = g; x.fillRect(0,0,RW,RH);
  x.fillStyle = 'rgba(255,255,255,0.04)'; x.font = 'bold 180px Space Grotesk'; x.textAlign = 'center'; x.textBaseline = 'middle';
  x.fillText(i+1, RW/2, RH/2);
  
  // Конвертируем в картинку и URL
  const img = new Image();
  const url = c.toDataURL('image/jpeg', 0.8);
  img.src = url;
  return { img, url };
}

// --- ЧАСТИЦЫ ---
let pts = [];
function initPts() { pts = []; for(let i=0;i<20;i++) pts.push({x:Math.random()*RW,y:Math.random()*RH,vx:(Math.random()-0.5)*1.5,vy:-Math.random()*2-0.5,s:Math.random()*2.5+0.5,a:Math.random()*0.3+0.1}); }
function drawFx(ctx, p, style) {
  const colors = {motivation:'#ffaa00',horror:'#882222',science:'#2266ff',humor:'#ff44ff',story:'#88aaff',facts:'#00ffaa'};
  ctx.save(); ctx.fillStyle = colors[style]||'#fff';
  pts.forEach(pt => { pt.x+=pt.vx; pt.y+=pt.vy; if(pt.y<-10){pt.y=RH+10;pt.x=Math.random()*RW;} ctx.globalAlpha=pt.a*(0.5+0.5*Math.sin(p*8+pt.x)); ctx.beginPath(); ctx.arc(pt.x,pt.y,pt.s,0,Math.PI*2); ctx.fill(); });
  ctx.restore();
}

// --- ТЕКСТ ---
function drawKineticText(ctx, w, h, text, progress) {
  const words = text.split(' '); if(!words.length) return;
  ctx.font = '800 42px "Space Grotesk", sans-serif';
  let lines = [], curLine = [];
  for (const word of words) {
    const test = curLine.join(' ') + (curLine.length ? ' ' : '') + word;
    if (ctx.measureText(test).width > w * 0.85 && curLine.length > 0) { lines.push(curLine.join(' ')); curLine = [word]; } else curLine.push(word);
  }
  if (curLine.length) lines.push(curLine.join(' '));
  
  const lineHeight = 54, baseY = h * 0.75 - ((lines.length - 1) * lineHeight) / 2;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  
  lines.forEach((line, li) => {
    const lWords = line.split(' ');
    let widths = lWords.map(w => ctx.measureText(w).width);
    let totalW = widths.reduce((a,b) => a+b, 0) + (lWords.length-1)*16;
    let startX = (w - totalW) / 2, y = baseY + li * lineHeight;

    lWords.forEach((word, wi) => {
      const wp = Math.max(0, Math.min(1, (progress - (li * 4 + wi) * 0.06) * 5));
      if (wp <= 0) return;
      ctx.save(); ctx.globalAlpha = wp; ctx.translate(startX + widths[wi]/2, y); ctx.scale(1.4 - wp * 0.4, 1.4 - wp * 0.4);
      ctx.strokeStyle = 'rgba(0,0,0,0.9)'; ctx.lineWidth = 5; ctx.lineJoin = 'round'; ctx.strokeText(word, 0, 0);
      ctx.fillStyle = '#fff'; ctx.fillText(word, 0, 0); ctx.restore();
      startX += widths[wi] + 16;
    });
  });
}

// --- РЕНДЕР КАДРА ---
function drawFrame(ctx, w, h, si, p, style) {
  const img = S.imgs[si]; if(!img) return;
  const dirs = [{x:0,y:0},{x:-1,y:0.5},{x:1,y:0},{x:0,y:-1},{x:-0.5,y:1},{x:0.5,y:-0.5},{x:-1,y:-0.5},{x:1,y:0.5}];
  const d = dirs[si % dirs.length];
  ctx.save(); ctx.translate(w/2 + d.x*p*40, h/2 + d.y*p*25); ctx.scale(1.1 + p*0.08, 1.1 + p*0.08); ctx.drawImage(img, -w/2, -h/2, w, h); ctx.restore();
  drawFx(ctx, p, style);
  const vig = ctx.createRadialGradient(w/2,h/2,h*0.3,w/2,h/2,h*0.8); vig.addColorStop(0,'rgba(0,0,0,0)'); vig.addColorStop(1,'rgba(0,0,0,0.7)'); ctx.fillStyle=vig; ctx.fillRect(0,0,w,h);
  const gr = ctx.createLinearGradient(0,h*0.55,0,h); gr.addColorStop(0,'rgba(0,0,0,0)'); gr.addColorStop(1,'rgba(0,0,0,0.9)'); ctx.fillStyle=gr; ctx.fillRect(0,0,w,h);
  if(S.sc.slides[si]) drawKineticText(ctx, w, h, S.sc.slides[si].text, p);
  ctx.save(); ctx.globalAlpha=0.3; ctx.fillStyle='#fff'; ctx.font='600 18px "DM Sans"'; ctx.textAlign='right'; ctx.fillText(`${si+1}/${S.num}`, w-25, 40); ctx.restore();
  if(p<0.05){ctx.fillStyle=`rgba(0,0,0,${1-p/0.05})`;ctx.fillRect(0,0,w,h);}
}

function drawPreview() { const c=document.getElementById('cvs'),x=c.getContext('2d'); x.clearRect(0,0,c.width,c.height); if(!S.imgs.length){x.fillStyle='#111';x.fillRect(0,0,c.width,c.height);return;} drawFrame(x,c.width,c.height,S.cur,0.6,S.style); }
function nav(d) { S.cur=Math.max(0,Math.min(S.num-1,S.cur+d)); updateUI(); }
function updateUI() { drawPreview(); document.getElementById('s-count').textContent=`${S.cur+1} / ${S.num}`; document.getElementById('b-prev').disabled=S.cur===0; document.getElementById('b-next').disabled=S.cur===S.num-1; document.querySelectorAll('.tl-item').forEach((el,i)=>el.classList.toggle('active',i===S.cur)); }

function buildTL() { 
  const tl=document.getElementById('tl'); tl.innerHTML=''; 
  // Теперь S.urls ВСЕГДА содержит только строки (URL или DataURL)
  S.urls.forEach((u,i) => { 
    const d=document.createElement('div'); d.className='tl-item'+(i===0?' active':'');
    d.innerHTML = `<img src="${u}"><span>${i+1}</span>`;
    d.onclick = () => { S.cur=i; updateUI(); }; 
    tl.appendChild(d); 
  }); 
}

// --- СБОРКА ВИДЕО ---
async function assemble() {
  const c = document.createElement('canvas'); c.width = RW; c.height = RH; const ctx = c.getContext('2d');
  const totalDur = S.audioDur > 0 ? S.audioDur : (S.num * 4);
  const slideDur = totalDur / S.num;
  const fps = 10; 
  const totalFrames = Math.ceil(totalDur * fps);
  const stream = c.captureStream(fps);
  let audioEl = null;

  if(S.audioUrl) { try { const aCtx=new AudioContext(),dest=aCtx.createMediaStreamDestination(); audioEl=new Audio(S.audioUrl); const src=aCtx.createMediaElementSource(audioEl); src.connect(dest); src.connect(aCtx.destination); dest.stream.getAudioTracks().forEach(t=>stream.addTrack(t)); } catch(e){} }

  let mime='video/webm;codecs=vp9,opus'; if(!MediaRecorder.isTypeSupported(mime)) mime='video/webm;codecs=vp8,opus'; if(!MediaRecorder.isTypeSupported(mime)) mime='video/webm';
  const rec=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:2500000}), chunks=[];
  rec.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};

  return new Promise((res,rej)=>{
    rec.onstop=()=>{if(audioEl)try{audioEl.pause();audioEl.currentTime=0;}catch(e){} res(new Blob(chunks,{type:'video/webm'}));};
    rec.onerror=e=>rej(e.error);
    rec.start(1000);
    if(audioEl) audioEl.play().catch(()=>{});
    let frame=0; initPts();
    function tick() {
      if(frame>=totalFrames){rec.stop();return;} 
      const t=frame/fps,si=Math.min(Math.floor(t/slideDur),S.num-1),sp=(t-si*slideDur)/slideDur; 
      drawFrame(ctx,RW,RH,si,sp,S.style); 
      if(frame%5===0) prog('p-vd',Math.round(frame/totalFrames*100),`${Math.round(frame/totalFrames*100)}%`); 
      frame++; setTimeout(tick, 100); 
    }
    setTimeout(tick, 200);
  });
}

function download() { if(!S.videoBlob) return; const a=document.createElement('a'); a.href=URL.createObjectURL(S.videoBlob); a.download=`shorts_${Date.now()}.webm`; a.click(); URL.revokeObjectURL(a.href); toast('Скачивается!','success'); }

// --- ГЛАВНЫЙ ПАЙПЛАЙН ---
async function generate() {
  const topic = document.getElementById('inp-topic').value.trim();
  if(!topic) { toast('Введите тему', 'warn'); return; } 
  if(S.busy) return; S.busy = true;
  
  const btn = document.getElementById('btn-gen'); btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Процесс...';
  document.getElementById('prog-wrap').style.display = 'flex';
  ['p-sc','p-im','p-vd'].forEach(id => prog(id, 0, '...'));
  document.getElementById('empty').style.display = 'none';

  try {
    // 1. СЦЕНАРИЙ
    prog('p-sc', 20, 'Генерация...'); 
    S.sc = await getScenario(topic, S.style, S.num);
    S.num = S.sc.slides.length; // Теперь тут ТОЧНО будет нужное число
    prog('p-sc', 100, `Готово (${S.num})`); 
    toast(`Сценарий: ${S.num} клипов`, 'success', 2000);

    // 2. КАРТИНКИ
    prog('p-im', 10, `0/${S.num}`); S.imgs = []; S.urls = [];
    const mods = {motivation:'cinematic, golden hour',facts:'vibrant',humor:'colorful',horror:'dark, eerie',science:'futuristic, blue',story:'dramatic lighting'};
    
    const promises = S.sc.slides.map((sl, i) => {
      const prompt = `${sl.img}, ${mods[S.style] || 'cinematic'}, vertical 9:16, high quality`;
      return getImg(prompt)
        .then(img => ({ idx: i, data: makeFallback(i, sl.text) })) // Временная заглушка
        .catch(() => ({ idx: i, data: makeFallback(i, sl.text) }));
    });

    // Загружаем всё параллельно, но если картинка real загрузилась - перезаписываем заглушку
    const imgPromises = S.sc.slides.map((sl, i) => {
      const prompt = `${sl.img}, ${mods[S.style] || 'cinematic'}, vertical 9:16, high quality`;
      return new Promise((resolve) => {
        const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=${RW}&height=${RH}&nologo=true&seed=${Math.floor(Math.random()*999999)}&model=flux`;
        const img = new Image(); img.crossOrigin = 'anonymous';
        const timer = setTimeout(() => {
          resolve({ idx: i, img: makeFallback(i, sl.text).img, url: makeFallback(i, sl.text).url });
        }, 45000);
        
        img.onload = () => { clearTimeout(timer); resolve({ idx: i, img: img, url: url }); };
        img.onerror = () => { clearTimeout(timer); const fb = makeFallback(i, sl.text); resolve({ idx: i, img: fb.img, url: fb.url }); };
        img.src = url;
      });
    });

    const results = await Promise.all(imgPromises);
    results.sort((a, b) => a.idx - b.idx);
    results.forEach(r => { S.imgs.push(r.img); S.urls.push(r.url); });
    
    prog('p-im', 100, 'Готово'); toast('Все кадры загружены', 'success');

    document.getElementById('preview').style.display = 'flex'; document.getElementById('tl-wrap').style.display = 'block'; S.cur = 0; drawPreview(); buildTL(); updateUI();

    // 3. РЕНДЕР
    prog('p-vd', 5, 'Старт...'); toast(`Рендер ${RW}p...`, 'info', 3000);
    S.videoBlob = await assemble();
    prog('p-vd', 100, 'Готово'); document.getElementById('b-dl').disabled = false;
    toast(`Готово! ${(S.videoBlob.size/1024/1024).toFixed(1)} МБ`, 'success');
    
  } catch(e) { 
    console.error(e); toast(`Ошибка: ${e.message}`, 'error'); 
    if(S.imgs.length) { document.getElementById('preview').style.display = 'flex'; document.getElementById('tl-wrap').style.display = 'block'; drawPreview(); buildTL(); updateUI(); } 
  } finally { S.busy = false; btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles" style="margin-right:8px;"></i>Собрать шортс'; }
}
